<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WERTONCARDS</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#0d0d0d;
            color:white;
        }

        header{
            text-align:center;
            padding:80px 20px;
            background:linear-gradient(135deg,#111,#1d1d1d);
        }

        h1{
            font-size:60px;
            color:#ff9800;
        }

        p{
            margin-top:20px;
            font-size:20px;
            color:#d7d7d7;
        }

        .button{
            display:inline-block;
            margin-top:35px;
            background:#ff9800;
            color:white;
            padding:15px 35px;
            text-decoration:none;
            border-radius:10px;
            font-size:18px;
            transition:.3s;
        }

        .button:hover{
            background:#ffb74d;
        }

        .cards{
            max-width:1200px;
            margin:60px auto;
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
            gap:25px;
            padding:20px;
        }

        .card{
            background:#1c1c1c;
            border-radius:15px;
            overflow:hidden;
            transition:.3s;
        }

        .card:hover{
            transform:translateY(-8px);
        }

        .card img{
            width:100%;
            height:350px;
            object-fit:cover;
        }

        .info{
            padding:20px;
        }

        .info h2{
            margin-bottom:10px;
        }

        .price{
            color:#ff9800;
            font-size:22px;
            margin:15px 0;
        }

        .buy{
            display:block;
            text-align:center;
            background:#ff9800;
            color:white;
            padding:12px;
            border-radius:8px;
            text-decoration:none;
        }

        footer{
            text-align:center;
            padding:40px;
            color:#888;
        }
    </style>

</head>
<body>

<header>

<h1>WERTONCARDS</h1>

<p>Premium Sports Cards</p>

<a class="button" href="#">Visit my Vinted</a>

</header>

<section class="cards">

<div class="card">

<img src="https://via.placeholder.com/400x500?text=Card+1">

<div class="info">

<h2>Victor Wembanyama Rookie</h2>

<div class="price">24 990 Ft</div>

<a class="buy" href="#">View on Vinted</a>

</div>

</div>

<div class="card">

<img src="https://via.placeholder.com/400x500?text=Card+2">

<div class="info">

<h2>LeBron James</h2>

<div class="price">18 990 Ft</div>

<a class="buy" href="#">View on Vinted</a>

</div>

</div>

<div class="card">

<img src="https://via.placeholder.com/400x500?text=Card+3">

<div class="info">

<h2>Michael Jordan</h2>

<div class="price">39 990 Ft</div>

<a class="buy" href="#">View on Vinted</a>

</div>

</div>

</section>

<footer>

© 2026 WERTONCARDS

</footer>

</body>
</html>
